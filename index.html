<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 주식 포트폴리오 · 2개 증권사 통합 관리</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa0ab;
    --accent: #4f7cff;
    --up: #ff5a5a;      /* 상승/이익 = 빨강 (한국식) */
    --down: #4d9aff;    /* 하락/손실 = 파랑 (한국식) */
    --chip: #232833;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }
  header.top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -0.3px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font: inherit; cursor: pointer; border-radius: 9px; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text); padding: 9px 14px; transition: .15s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.ghost { background: transparent; }
  button.mini { padding: 4px 9px; font-size: 12px; border-radius: 7px; }
  button.danger:hover { border-color: var(--up); color: var(--up); }

  /* 요약 카드 */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0 26px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
  .card .label { color: var(--muted); font-size: 12px; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 6px; letter-spacing: -0.4px; }
  .card .value.small { font-size: 18px; }
  @media (max-width: 820px) { .summary { grid-template-columns: repeat(2, 1fr); } }

  /* 증권사 섹션 */
  .broker { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 22px; overflow: hidden; }
  .broker-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); background: var(--panel-2); flex-wrap: wrap; }
  .broker-head .name { font-weight: 700; font-size: 16px; background: transparent; border: 1px solid transparent; color: var(--text); padding: 4px 8px; border-radius: 8px; width: auto; max-width: 260px; }
  .broker-head .name:focus { border-color: var(--line); background: var(--bg); outline: none; }
  .broker-sub { color: var(--muted); font-size: 13px; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 900px; }
  th, td { padding: 10px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; background: var(--panel); position: sticky; top: 0; }
  th:first-child, td:first-child, th.l, td.l { text-align: left; }
  tbody tr:hover { background: var(--panel-2); }
  td input {
    font: inherit; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 7px; padding: 6px 8px; width: 100%; text-align: right;
  }
  td input.l { text-align: left; }
  td input:focus { outline: none; border-color: var(--accent); }
  .code-in { width: 90px; }
  .name-in { width: 130px; }
  .num-in { width: 96px; }
  .price-cell { font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--muted); }
  tfoot td { font-weight: 700; background: var(--panel-2); border-top: 2px solid var(--line); }
  .broker-foot { padding: 12px 18px; border-top: 1px solid var(--line); background: var(--panel-2); }

  .empty { text-align: center; color: var(--muted); padding: 26px; }
  .status { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--chip); color: var(--muted); border: 1px solid var(--line); }
  .footnote { color: var(--muted); font-size: 12px; margin-top: 28px; line-height: 1.7; }
  a { color: var(--accent); }
  .price-manual { color: var(--muted); font-size: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>📊 내 주식 포트폴리오</h1>
      <div class="sub">2개 증권사 보유 주식을 한 곳에서 · 매입가는 입력, 현재가는 자동 조회</div>
    </div>
    <div class="toolbar">
      <button id="refreshBtn" class="primary">🔄 현재가 새로고침</button>
      <button id="resetBtn" class="ghost">전체 초기화</button>
    </div>
  </header>

  <!-- 요약 -->
  <section class="summary">
    <div class="card">
      <div class="label">총 매입금액</div>
      <div class="value small" id="sumCost">-</div>
    </div>
    <div class="card">
      <div class="label">총 평가금액</div>
      <div class="value small" id="sumValue">-</div>
    </div>
    <div class="card">
      <div class="label">총 평가손익 (A+B 합산)</div>
      <div class="value" id="sumProfit">-</div>
    </div>
    <div class="card">
      <div class="label">총 수익률</div>
      <div class="value" id="sumRate">-</div>
    </div>
  </section>

  <div id="brokers"></div>

  <div class="status" id="status"></div>

  <p class="footnote">
    현재가는 <span class="badge">한국투자증권 KIS Open API</span> 를 통해 조회됩니다.
    시세 서버(프록시)가 연결되지 않은 경우, 현재가 칸을 직접 클릭해 수동 입력할 수 있습니다 (그래도 손익은 자동 계산됩니다).<br>
    입력한 내용은 이 브라우저에 자동 저장됩니다. · 종목코드는 6자리 숫자입니다 (예: 삼성전자 005930, 카카오 035720).
  </p>
</div>

<script>
/* ---------------- 데이터 모델 ---------------- */
const STORAGE_KEY = "stock_portfolio_v1";
const DEFAULT_DATA = {
  brokers: [
    { name: "A증권", rows: [ blankRow("삼성전자", "005930", 10, 70000) ] },
    { name: "B증권", rows: [ blankRow("카카오", "035720", 5, 55000) ] }
  ]
};

function blankRow(name = "", code = "", qty = "", buy = "") {
  return { name, code, qty, buy, price: null, manual: false, err: null };
}

let data = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

/* ---------------- 숫자 포맷 ---------------- */
const won = n => (n === null || n === "" || isNaN(n)) ? "-" : Math.round(n).toLocaleString("ko-KR") + "원";
const pct = n => (n === null || isNaN(n)) ? "-" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
function cls(n) { return n > 0 ? "up" : n < 0 ? "down" : "flat"; }

/* ---------------- 렌더링 ---------------- */
function render() {
  const container = document.getElementById("brokers");
  container.innerHTML = "";

  let gCost = 0, gValue = 0;

  data.brokers.forEach((broker, bi) => {
    let bCost = 0, bValue = 0;

    const rowsHtml = broker.rows.map((r, ri) => {
      const qty = parseFloat(r.qty) || 0;
      const buy = parseFloat(r.buy) || 0;
      const price = (r.price === null || r.price === "" || isNaN(r.price)) ? null : parseFloat(r.price);
      const cost = qty * buy;
      const value = price !== null ? qty * price : null;
      const profit = value !== null ? value - cost : null;
      const rate = (value !== null && cost > 0) ? (profit / cost) * 100 : null;
      bCost += cost;
      if (value !== null) bValue += value;

      const priceDisplay = price !== null
        ? price.toLocaleString("ko-KR") + (r.manual ? ' <span class="price-manual">(수동)</span>' : "")
        : (r.err ? '<span class="down">조회실패</span>' : '<span class="flat">미조회</span>');

      return `<tr data-b="${bi}" data-r="${ri}">
        <td class="l"><input class="l name-in" data-f="name" value="${esc(r.name)}" placeholder="종목명" /></td>
        <td class="l"><input class="l code-in" data-f="code" value="${esc(r.code)}" placeholder="005930" maxlength="6" /></td>
        <td><input class="num-in" data-f="qty" value="${esc(r.qty)}" placeholder="0" inputmode="decimal" /></td>
        <td><input class="num-in" data-f="buy" value="${esc(r.buy)}" placeholder="0" inputmode="decimal" /></td>
        <td class="price-cell" data-price title="클릭하면 직접 입력">${priceDisplay}</td>
        <td>${cost ? won(cost) : "-"}</td>
        <td>${value !== null ? won(value) : "-"}</td>
        <td class="${profit === null ? "flat" : cls(profit)}">${profit !== null ? (profit >= 0 ? "+" : "") + won(Math.abs(profit)).replace("원","")+"원" : "-"}</td>
        <td class="${rate === null ? "flat" : cls(rate)}">${pct(rate)}</td>
        <td><button class="mini danger ghost" data-del>✕</button></td>
      </tr>`;
    }).join("");

    const bProfit = bValue - bCost;
    const bRate = bCost > 0 ? (bProfit / bCost) * 100 : null;
    gCost += bCost; gValue += bValue;

    const section = document.createElement("div");
    section.className = "broker";
    section.innerHTML = `
      <div class="broker-head">
        <input class="name" data-bname="${bi}" value="${esc(broker.name)}" />
        <span class="broker-sub">보유 ${broker.rows.length}종목 · 평가손익
          <b class="${cls(bProfit)}">${(bProfit>=0?"+":"")+won(Math.abs(bProfit)).replace("원","")+"원"}</b>
          (<span class="${cls(bRate)}">${pct(bRate)}</span>)</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th class="l">종목명</th><th class="l">종목코드</th><th>보유수량</th>
            <th>매입평균가</th><th>현재가</th><th>매입금액</th><th>평가금액</th>
            <th>평가손익</th><th>수익률</th><th></th>
          </tr></thead>
          <tbody>${rowsHtml || `<tr><td colspan="10" class="empty">보유 종목이 없습니다. 아래 버튼으로 추가하세요.</td></tr>`}</tbody>
          <tfoot><tr>
            <td class="l" colspan="5">소계</td>
            <td>${won(bCost)}</td>
            <td>${bValue?won(bValue):"-"}</td>
            <td class="${cls(bProfit)}">${(bProfit>=0?"+":"")+won(Math.abs(bProfit)).replace("원","")+"원"}</td>
            <td class="${cls(bRate)}">${pct(bRate)}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>
      <div class="broker-foot"><button class="mini" data-add="${bi}">+ 종목 추가</button></div>
    `;
    container.appendChild(section);
  });

  // 요약
  const gProfit = gValue - gCost;
  const gRate = gCost > 0 ? (gProfit / gCost) * 100 : null;
  document.getElementById("sumCost").textContent = won(gCost);
  document.getElementById("sumValue").textContent = gValue ? won(gValue) : "-";
  const sp = document.getElementById("sumProfit");
  sp.textContent = (gProfit >= 0 ? "+" : "") + won(Math.abs(gProfit)).replace("원","") + "원";
  sp.className = "value " + cls(gProfit);
  const sr = document.getElementById("sumRate");
  sr.textContent = pct(gRate);
  sr.className = "value " + cls(gRate);
}

function esc(s) { return String(s ?? "").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

/* ---------------- 이벤트 ---------------- */
document.getElementById("brokers").addEventListener("input", (e) => {
  const t = e.target;
  if (t.dataset.bname !== undefined) { data.brokers[+t.dataset.bname].name = t.value; save(); return; }
  const tr = t.closest("tr");
  if (!tr || t.dataset.f === undefined) return;
  const r = data.brokers[+tr.dataset.b].rows[+tr.dataset.r];
  r[t.dataset.f] = t.value;
  save();
  render(); // 손익 실시간 재계산
  // 재렌더 후 포커스 유지
  refocus(tr.dataset.b, tr.dataset.r, t.dataset.f);
});

let lastFocus = null;
function refocus(b, r, f) {
  const sel = `tr[data-b="${b}"][data-r="${r}"] input[data-f="${f}"]`;
  const el = document.querySelector(sel);
  if (el) { const v = el.value; el.focus(); el.setSelectionRange(v.length, v.length); }
}

document.getElementById("brokers").addEventListener("click", (e) => {
  const add = e.target.dataset.add;
  if (add !== undefined) { data.brokers[+add].rows.push(blankRow()); save(); render(); return; }
  if (e.target.dataset.del !== undefined) {
    const tr = e.target.closest("tr");
    data.brokers[+tr.dataset.b].rows.splice(+tr.dataset.r, 1);
    save(); render(); return;
  }
  // 현재가 수동 입력
  const priceCell = e.target.closest("[data-price]");
  if (priceCell) editPrice(priceCell);
});

function editPrice(cell) {
  const tr = cell.closest("tr");
  const r = data.brokers[+tr.dataset.b].rows[+tr.dataset.r];
  const cur = r.price ?? "";
  const inp = document.createElement("input");
  inp.value = cur; inp.className = "num-in"; inp.inputMode = "decimal";
  cell.innerHTML = ""; cell.appendChild(inp); inp.focus();
  const commit = () => {
    const v = inp.value.replace(/,/g, "").trim();
    r.price = v === "" ? null : parseFloat(v);
    r.manual = v !== "";
    r.err = null;
    save(); render();
  };
  inp.addEventListener("blur", commit);
  inp.addEventListener("keydown", (ev) => { if (ev.key === "Enter") inp.blur(); });
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("모든 입력 내용을 지우고 초기 상태로 되돌립니다. 계속할까요?")) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA)); save(); render();
  }
});

/* ---------------- 현재가 조회 ---------------- */
document.getElementById("refreshBtn").addEventListener("click", refreshPrices);

async function refreshPrices() {
  const btn = document.getElementById("refreshBtn");
  const status = document.getElementById("status");
  btn.disabled = true; btn.textContent = "조회 중...";

  const codes = [];
  data.brokers.forEach(b => b.rows.forEach(r => {
    const c = (r.code || "").trim();
    if (/^\d{6}$/.test(c) && !codes.includes(c)) codes.push(c);
  }));

  if (codes.length === 0) {
    status.textContent = "조회할 종목코드(6자리)가 없습니다.";
    btn.disabled = false; btn.textContent = "🔄 현재가 새로고침"; return;
  }

  let ok = 0, fail = 0, serverDown = false;
  await Promise.all(codes.map(async (code) => {
    try {
      const res = await fetch(`/api/price?code=${code}`);
      if (!res.ok) throw new Error("http " + res.status);
      const j = await res.json();
      if (j.price == null) throw new Error("no price");
      applyPrice(code, parseFloat(j.price)); ok++;
    } catch (err) {
      if (err.message && err.message.includes("Failed to fetch")) serverDown = true;
      applyError(code); fail++;
    }
  }));

  save(); render();
  if (serverDown) {
    status.innerHTML = "⚠️ 시세 서버에 연결할 수 없습니다. 아직 배포(Vercel) 전이거나 환경변수(API 키) 설정 전일 수 있어요. 그동안 현재가 칸을 클릭해 <b>직접 입력</b>하시면 손익은 자동 계산됩니다.";
  } else {
    status.textContent = `현재가 갱신 완료 · 성공 ${ok}종목${fail ? `, 실패 ${fail}종목` : ""} · ${new Date().toLocaleTimeString("ko-KR")}`;
  }
  btn.disabled = false; btn.textContent = "🔄 현재가 새로고침";
}

function applyPrice(code, price) {
  data.brokers.forEach(b => b.rows.forEach(r => {
    if ((r.code || "").trim() === code) { r.price = price; r.manual = false; r.err = null; }
  }));
}
function applyError(code) {
  data.brokers.forEach(b => b.rows.forEach(r => {
    if ((r.code || "").trim() === code && !r.manual) { r.err = true; }
  }));
}

render();
</script>
</body>
</html>
